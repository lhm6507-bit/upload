<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<style>
h2{color:red;}
</style>
<style>

/* 전체 화면 가운데 정렬 */
body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f2f4f7;
    font-family:Arial;
}

/* 로그인 박스 */
form{
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
    width:260px;
}

/* 각 줄 간격 */
form div{
    margin-bottom:15px;
}

/* input 스타일 */
input{
    width:100%;
    padding:8px;
    margin-top:5px;
    border:1px solid #ccc;
    border-radius:5px;
}

/* 버튼 스타일 */
button{
    width:100%;
    padding:10px;
    border:none;
    background:#4CAF50;
    color:white;
    font-size:15px;
    border-radius:5px;
    cursor:pointer;
}

/* 버튼 호버 */
button:hover{
    background:#43a047;
}

</style>

</head>

<body>

<form action="login_output2.jsp">
	<div>
		<div>ID : <input type="text" name="id"></div>
		<div>PW : <input type="password" name="pw"></div>
		<div><button type="submit">login</button></div>
	</div>
</form>

</body>
</html>
